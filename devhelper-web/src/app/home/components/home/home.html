<div class="h-screen overflow-hidden grid grid-cols-12 grid-rows-[1fr_2fr_1fr_2fr] gap-4 px-4 pt-4">
    <sh-card-base class="col-span-7 " title="Proyectos">
        <div actions>
            <sh-card-button icon="filter_alt" />
            <sh-card-button icon="add" type="circle" severity="primary" />
        </div>
    </sh-card-base>
    <sh-card-base class="col-span-5"></sh-card-base>
    <sh-card-base class="col-span-8 row-span-2" color="LIGTH" title="Tareas">
    </sh-card-base>
    <div class="col-span-4 min-h-0 flex gap-4">
        <sh-card-base actions="false">
            <div class="flex flex-col gap-4 items-center justify-center h-full">
                <sh-card-button icon="data_object" iconClass="text-3xl!" styleClass="p-6!" size="lg" />
                <sh-card-button icon="settings" size="xl" iconClass="text-3xl!" styleClass="p-6!" />
                <sh-card-button icon="logout" size="xl" iconClass="text-3xl!" styleClass="p-6!" (click)="logout()" />

            </div>
        </sh-card-base>
        <sh-card-base class="w-full" color="LIGTH" title="Calendario"></sh-card-base>
    </div>
    <nasa-picture class="col-span-4 " />
    <sh-card-base class="col-span-6 min-h-0" title="Archivos">
        <div actions>
            <sh-card-button icon="filter_alt" />
            <sh-card-button icon="add" type="circle" severity="primary" />
        </div>
    </sh-card-base>
    <password-list class="col-span-6 min-h-0" />
</div>


<dialog #secureModal class="modal">
    <div class="modal-box max-w-xl">
        <h3 class="text-2xl font-bold flex space-x-1 items-center">
            <span class="icon">shield</span> <span>Configurar Vault</span>
        </h3>
        <p class="p-3  my-3 rounded-xl bg-base-300">Este paso añade una capa de seguridad para acceder a tus datos.
            Podrás desbloquear tu vault usando el método que elijas.</p>
        <form [formGroup]="_secureForm" class="pt-4 grid gap-4" (ngSubmit)="createSecurity()">
            <div class="flex flex-col gap-2 ">
                <label class="font-medium">Elige método</label>
                <label class="flex items-center space-x-2">
                    <input class="radio" type="radio" formControlName="type" value="pin" />
                    <span>PIN</span>
                </label>
                <label class="flex items-center space-x-2">
                    <input class="radio" type="radio" formControlName="type" value="passkey" />
                    <span>Passkey</span>
                </label>
            </div>
            @if(_secureForm.value.type === 'pin'){
            <sh-input type="number" label="Crear PIN" inputId="pin" formControlName="pin" />
            }
            @if(_secureForm.value.type === 'passkey'){
            <p class="text-sm text-gray-500">
                Se creará una Passkey usando tu dispositivo actual.
            </p>
            <button type="button" class="btn btn-primary" (click)="registerPasskey()">
                <span class="icon">encrypted_add</span>
                Crear Passkey
            </button>
            }
            <div class="modal-action flex space-x-3 pt-2">
                <sh-button label="Cancelar" severity="secondary" type="reset" (click)="secureModal.close()" />
                <sh-button label="Guardar" severity="primary" type="submit" />
            </div>
        </form>
    </div>
</dialog>
