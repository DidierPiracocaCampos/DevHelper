<button
  class="btn btn-base {{ getSeverityClass() }} {{ getSizeClass() }} w-full"
  [class.px-7]="isLoading()"
  [disabled]="disabled()"
  [attr.type]="type()"
  (click)="onClick.emit()">
  @if (isLoading()) {
    <span class="loading loading-infinity loading-sm"></span>
  } @else {
    @if (icon()) {
      <span class="icon icon-lg">{{ icon() }}</span>
    }
    {{ label() }}
  }
</button>
