<li class="list-row py-2 justify-center items-center {{severity() == 'secondary'? ' bg-secondary':' bg-primary' }}">
    <div class="list-col-grow">
        @if(label()){
        <span class="font-semibold text-[1.05rem]">{{label()}}</span>
        }
        @if(sub()){
        <span class=" text-xs">{{sub()}}</span>
        }
    </div>

    <div class="flex ">
        <ng-content select="[actions]"></ng-content>
    </div>
</li>
