<button class="btn btn-{{severity()}} flex gap-2 justify-center items-center {{btnClass()}}" [ngClass]="{'px-7': isLoandig()}" (click)="onClick.emit()"
    [disabled]="disabled()" [attr.type]="type()? type() : null">
    @if(isLoandig()){
    <span class="loading loading-infinity loading-sm"></span>
    }@else{
    @if(icon()){
    <span class="icon">{{icon()}}</span>
    }
    {{label()}}
    }
</button>
