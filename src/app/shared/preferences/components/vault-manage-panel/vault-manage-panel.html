<section class="space-y-6">
  <header class="space-y-1">
    <h3 class="text-lg font-semibold">Bóveda</h3>
  </header>

  <div class="flex items-center gap-2">
    <span class="badge badge-success badge-sm">desbloqueada</span>
  </div>

  <div class="space-y-2">
    <h4 class="text-sm font-medium text-base-content/70">Métodos de desbloqueo</h4>
    <ul class="flex flex-col gap-2">
      @if (havePin()) {
        <li class="flex items-center gap-3 rounded-lg bg-base-200 px-4 py-3">
          <span class="icon text-base-content/70">password</span>
          <span class="text-sm">PIN</span>
        </li>
      }
      @if (havePasskey()) {
        <li class="flex items-center gap-3 rounded-lg bg-base-200 px-4 py-3">
          <span class="icon text-base-content/70">passkey</span>
          <span class="text-sm">Passkey</span>
        </li>
      }
    </ul>
  </div>

  @if (havePin()) {
    <div class="space-y-4">
      <h4 class="text-sm font-medium text-base-content/70">Cambiar PIN</h4>
      @if (pinChanged()) {
        <ui-alert severity="success" message="PIN actualizado correctamente." icon="check_circle" />
      }
      <form
        [formGroup]="changePinForm"
        (ngSubmit)="submitChangePin()"
        class="flex flex-col gap-4 max-w-sm"
      >
        @if (pinError()) {
          <ui-alert severity="error" [message]="pinError()" icon="error" />
        }
        <ui-pin-field
          inputId="current-pin"
          labelText="PIN actual"
          formControlName="currentPin"
          [length]="5"
        />
        <ui-pin-field
          inputId="new-pin"
          labelText="Nuevo PIN"
          formControlName="newPin"
          [length]="5"
        />
        <ui-pin-field
          inputId="confirm-pin"
          labelText="Confirma el nuevo PIN"
          formControlName="confirmPin"
          [length]="5"
        >
          <ng-template errorMessage="notMatching">
            <p class="validator-hint">El PIN no coincide</p>
          </ng-template>
        </ui-pin-field>
        <ui-button
          icon="password"
          label="Cambiar PIN"
          severity="primary"
          type="submit"
          [loading]="isChangingPin()"
          [disabled]="isChangingPin()"
        />
      </form>
    </div>
  }

  <div class="pt-4 border-t border-base-300">
    <ui-button
      icon="lock"
      label="Bloquear bóveda"
      severity="neutral"
      variant="outline"
      data-testid="btn-lock"
      (press)="lockVault()"
    />
  </div>
</section>
