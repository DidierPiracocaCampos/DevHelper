<section class="space-y-4">
  <header class="flex items-center justify-between">
    <div>
      <h4 class="text-lg font-semibold">Widget NASA</h4>
      <p class="text-sm text-base-content/70">
        Personaliza la imagen que se muestra en la tarjeta del widget.
      </p>
    </div>
  </header>

  <div
    class="rounded-2xl overflow-hidden bg-base-200 aspect-video max-w-xl max-h-72 mx-auto flex items-center justify-center"
  >
    @if (previewUrl(); as url) {
      <img
        [src]="url"
        alt="Vista previa de la imagen del widget NASA"
        class="w-full h-full object-cover"
      />
    } @else if (isNasaLoading()) {
      <span class="loading loading-spinner loading-md text-base-content/50"></span>
    } @else {
      <span class="icon text-4xl text-base-content/30">image</span>
    }
  </div>

  <div class="flex flex-wrap gap-2">
    <ui-button
      icon="upload"
      label="Cambiar imagen"
      severity="primary"
      [loading]="isBusy()"
      [disabled]="isBusy()"
      (click)="changeImage()"
    />
    @if (hasCustomImage()) {
      <ui-button
        icon="delete"
        label="Quitar imagen personalizada"
        severity="error"
        variant="ghost"
        [loading]="isBusy()"
        [disabled]="isBusy()"
        (click)="clearImage()"
      />
    }
  </div>

  @if (errorMessage(); as err) {
    <ui-alert severity="error" title="Error" [message]="err" icon="error" />
  }

  <input #picker type="file" [accept]="accept" class="hidden" (change)="onFileSelected($event)" />
</section>
