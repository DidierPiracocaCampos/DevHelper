<div class="toast toast-top toast-end z-50">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="alert alert-soft alert-{{ toast.severity }} cursor-pointer max-w-[420px] toast-fade-in"
      [class.toast-expanded]="toast.expanded"
      [class.toast-fade-out]="toast.closing"
      (click)="onToastClick(toast)"
      role="alert"
      aria-live="polite"
    >
      <span class="icon text-{{ toast.severity }}">{{ getIcon(toast.severity) }}</span>
      <div class="flex-1 min-w-0">
        <span class="font-semibold block truncate">{{ toast.message }}</span>
        @if (toast.expanded && toast.details) {
          <pre class="toast-details">{{ toast.details }}</pre>
        }
      </div>
      <button
        class="btn btn-ghost btn-xs btn-circle"
        (click)="onDismiss($event, toast.id)"
        aria-label="Cerrar notificación"
      >
        <span class="icon">close</span>
      </button>
    </div>
  }
</div>
