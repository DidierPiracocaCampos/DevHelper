<label class="label-field" [attr.for]="inputId()">{{ labelText() }}:</label>
<div class="input input-md w-full" [class.validator]="isInvalid()">
  <span class="icon text-lg!">mail</span>
  <input
    class="input-grow"
    [id]="inputId()"
    type="email"
    inputmode="email"
    [value]="value() ?? ''"
    [placeholder]="placeholder()"
    [attr.autocomplete]="autocomplete()"
    [disabled]="disabled()"
    [attr.aria-invalid]="isInvalid() ? true : null"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  <ng-content select="[suffix]" />
</div>

<ui-field-errors />
