<label class="label-field" [attr.for]="inputId()">{{ labelText() }}:</label>
<div class="input input-lg w-full" [class.validator]="isInvalid()">
  <span class="icon text-lg!">key</span>
  <input
    class="input-grow"
    [id]="inputId()"
    [type]="inputType()"
    [value]="value() ?? ''"
    [placeholder]="placeholder()"
    [attr.autocomplete]="autocomplete()"
    [disabled]="disabled()"
    [attr.aria-invalid]="isInvalid() ? true : null"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  <button
    type="button"
    class="icon text-[1rem]! text-neutral-400 hover:text-base-content transition-colors duration-200"
    [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
    [attr.aria-pressed]="showPassword()"
    tabindex="0"
    (click)="togglePassword()"
    (keydown)="onToggleKeydown($event)"
  >
    {{ showPassword() ? 'visibility' : 'visibility_off' }}
  </button>
  <ng-content select="[suffix]" />
</div>

<ui-field-errors />
