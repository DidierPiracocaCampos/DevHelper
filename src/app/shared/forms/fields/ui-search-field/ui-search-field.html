@if (label(); as l) {
  <label class="label-field" [attr.for]="inputId()">
    <ng-container *ngTemplateOutlet="l.template" />
  </label>
}
<div class="input input-lg w-full" [class.validator]="isInvalid()">
  <input
    class="input-grow"
    [id]="inputId()"
    type="search"
    [value]="value() ?? ''"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [attr.aria-invalid]="isInvalid() ? true : null"
    (input)="onInput($event)"
    (blur)="onBlur()"
    (keyup.enter)="emit()"
  />
  @if (hasValue() && !disabled()) {
    <button
      type="button"
      class="icon text-base-content/60 hover:text-base-content"
      aria-label="Limpiar búsqueda"
      (click)="clear()"
    >
      close
    </button>
  }
  @if (!disabled()) {
    <button
      type="button"
      class="icon text-base-content/60 hover:text-base-content"
      aria-label="Buscar"
      [disabled]="!hasValue()"
      (click)="emit()"
    >
      search
    </button>
  }
  <ng-content select="[suffix]" />
</div>

<ui-field-errors />
