@if (label(); as l) {
  <label class="label-field" [attr.for]="inputId()">
    <ng-container *ngTemplateOutlet="l.template" />
  </label>
}
<div class="input input-lg w-full" [class.validator]="isInvalid()">
  <ng-content select="[prefix]" />
  <input
    class="input-grow"
    [id]="inputId()"
    type="number"
    inputmode="numeric"
    [value]="value() ?? ''"
    [placeholder]="placeholder()"
    [min]="min()"
    [max]="max()"
    [step]="step()"
    [disabled]="disabled()"
    [attr.aria-invalid]="isInvalid() ? true : null"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  <ng-content select="[suffix]" />
</div>

<ui-field-errors />
