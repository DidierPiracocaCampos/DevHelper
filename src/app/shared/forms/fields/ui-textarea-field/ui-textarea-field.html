@if (label(); as l) {
  <label class="label-field" [attr.for]="inputId()">
    <ng-container *ngTemplateOutlet="l.template" />
  </label>
}
<div class="textarea-wrapper" [class.validator]="isInvalid()">
  <ng-content select="[prefix]" />
  <textarea
    class="textarea textarea-lg textarea-grow"
    [id]="inputId()"
    [rows]="rows()"
    [value]="value() ?? ''"
    [placeholder]="placeholder()"
    [attr.maxlength]="maxlength()"
    [disabled]="disabled()"
    [attr.aria-invalid]="isInvalid() ? true : null"
    (input)="onInput($event)"
    (blur)="onBlur()"
  ></textarea>
  <ng-content select="[suffix]" />
  @if (maxlength() !== null) {
    <span class="text-xs opacity-60 self-end mt-1">{{ charCount() }} / {{ maxlength() }}</span>
  }
</div>

<ui-field-errors />
