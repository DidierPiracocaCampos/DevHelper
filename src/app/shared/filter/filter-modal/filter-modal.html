<ui-modal [title]="title()" [(isOpen)]="isOpen" size="md">
  <div body class="flex flex-col gap-4">
    @for (field of fields(); track field.key) {
      <div class="flex flex-col gap-2">
        <label class="font-semibold flex items-center gap-2">
          <input
            type="checkbox"
            class="checkbox checkbox-sm"
            [checked]="entryFor(field.key).enabled"
            (change)="onToggle(field.key, $any($event.target).checked)"
          />
          {{ field.label }}
        </label>

        <div class="grid grid-cols-2 gap-2">
          @if (field.ops.length > 1) {
            <ui-select-field
              [inputId]="'op-' + field.key"
              [options]="opOptionsFor(field)"
              [ngModel]="entryFor(field.key).op"
              (ngModelChange)="onOpChange(field.key, $event)"
            />
          } @else {
            <span
              class="flex items-center px-3 text-sm opacity-70 self-stretch rounded"
              [attr.data-testid]="'op-label-' + field.key"
            >
              {{ opLabel(field.ops[0]) }}
            </span>
          }

          @switch (field.control) {
            @case ('text') {
              <input
                type="text"
                class="input input-lg w-full min-w-0"
                [placeholder]="field.placeholder ?? ''"
                [ngModel]="entryFor(field.key).value"
                (ngModelChange)="onValueChange(field.key, $event)"
              />
            }
            @case ('number') {
              <input
                type="number"
                class="input input-lg w-full min-w-0"
                [placeholder]="field.placeholder ?? ''"
                [ngModel]="entryFor(field.key).value"
                (ngModelChange)="onValueChange(field.key, +$event)"
              />
            }
            @case ('date') {
              <input
                type="date"
                class="input input-lg w-full min-w-0"
                [ngModel]="entryFor(field.key).value"
                (ngModelChange)="onValueChange(field.key, $event)"
              />
            }
            @case ('boolean') {
              <ui-select-field
                [inputId]="'val-' + field.key"
                [options]="booleanOptions"
                [ngModel]="entryFor(field.key).value ? 'true' : 'false'"
                (ngModelChange)="onValueChange(field.key, $event === 'true')"
              />
            }
            @case ('select') {
              <ui-select-field
                [inputId]="'val-' + field.key"
                [options]="valueOptionsFor(field)"
                [ngModel]="entryFor(field.key).value"
                (ngModelChange)="onValueChange(field.key, $event)"
              />
            }
          }
        </div>
      </div>
    }
  </div>

  <div footer class="flex justify-end gap-2">
    <ui-button label="Limpiar" severity="secondary" (press)="onClear()" />
    <ui-button label="Aplicar" variant="filled" (press)="onApply()" />
  </div>
</ui-modal>
