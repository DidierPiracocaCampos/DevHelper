<span class="badge badge-soft badge-primary gap-2 py-3 px-3 text-sm">
  <span class="font-semibold">{{ field().label }}</span>
  <span class="opacity-70">{{ value().op }}</span>
  <span>{{ displayValue() }}</span>
  <button
    type="button"
    class="icon text-sm cursor-pointer"
    aria-label="Quitar filtro"
    (click)="onRemove()"
  >
    close
  </button>
</span>
