<div class="relative inline-block">
  <ui-card-button data-testid="filter-trigger" icon="filter_alt" (press)="open()" />
  @if (count() > 0) {
    <span
      data-testid="filter-count"
      class="badge badge-primary badge-sm absolute -top-1 -right-1 pointer-events-none"
    >
      {{ count() }}
    </span>
  }
</div>

<filter-modal
  [schema]="schema()"
  [initialFilters]="state()"
  [title]="'Filtros'"
  [(isOpen)]="isOpen"
  (apply)="onApply($event)"
  (clear)="onClear()"
/>
