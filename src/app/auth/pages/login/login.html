<ui-auth-shell>
  <div
    class="bg-base-content h-35 w-35 flex justify-center items-center rounded-2xl mb-4 sm:mb-6 md:mb-8"
  >
    <span class="icon text-base-100 text-7xl!">data_object</span>
  </div>

  <router-outlet />

  <ng-container authFooter>
    <hr class="m-2 sm:m-3 w-full opacity-30" />

    <button
      class="btn btn-outline btn-md w-full flex items-center justify-center"
      (click)="loginWithGoogle()"
    >
      <img src="/icons/google.svg" width="20" alt="google logo" class="mr-2" />
      Iniciar sesión con Google
    </button>

    <button
      class="btn btn-outline btn-md w-full flex items-center justify-center"
      (click)="loginWithGithub()"
    >
      <img src="/icons/github.svg" width="20" alt="github logo" class="mr-2" />
      Iniciar sesión con GitHub
    </button>
  </ng-container>
</ui-auth-shell>
