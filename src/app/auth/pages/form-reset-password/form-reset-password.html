@if(successMessage()){
<div class="alert alert-success p-4">
    <span class="icon">mark_email_unread</span>
    <div>
        <h3 class="font-bold">Correo enviado</h3>
        <p class="text-sm">Revisa tu bandeja de entrada para restablecer tu contraseña.</p>
    </div>
</div>
<div class="mt-4 text-center">
    <a class="link link-primary" routerLink="/login">Volver al login</a>
</div>
}@else{
<form [formGroup]="form" class="p-4 min-w-[25rem] grid gap-4" (ngSubmit)="onSubmit()">
    <p class="text-center opacity-70 text-sm">
        Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
    </p>

    @if(errorMessage()){
    <div class="alert alert-error">
        <span class="icon">error</span>
        <span>{{errorMessage()}}</span>
    </div>
    }

    <auth-email-input inputId="email" formControlName="email" />

    <button class="btn btn-primary btn-lg mt-4" type="submit" [disabled]="loading">
        @if(loading){
        <span class="loading loading-infinity"></span>
        }@else{
        Enviar correo
        }
    </button>

    <div class="text-center mt-2">
        <a class="link link-primary text-sm" routerLink="/login">Volver al login</a>
    </div>
</form>
}
