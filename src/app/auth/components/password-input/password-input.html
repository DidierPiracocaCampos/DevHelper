<label class="label">{{label()}}:</label>
<div class="input input-lg w-full validator">
    <span class="icon text-lg!">
        key
    </span>
    <input [id]="inputId()" [value]="value" (input)="onInput($event)" [attr.aria-invalid]="isInvalid ? true : null"
        (blur)="handleBlur()" [disabled]="isDisabled" type="text" />
</div>

@for (m of errorMessages(); track $index) {
@if((errors?.[m.error()] && isInvalid) || m.visible()){
<ng-container [ngTemplateOutlet]="m.template" [ngTemplateOutletContext]=" { $implicit: errors?.[m.error()] }">
</ng-container>
}
}
