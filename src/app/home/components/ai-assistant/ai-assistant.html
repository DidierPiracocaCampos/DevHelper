<div
  class="search-trigger"
  role="button"
  tabindex="0"
  [attr.aria-label]="ariaLabel()"
  (click)="open()"
  (keydown.enter)="open()"
  (keydown.space)="$event.preventDefault(); open()"
>
  <span class="icon icon-lg text-base-content/60 shrink-0">search</span>
  <span class="text-sm text-base-content/50 truncate flex-1">Pregunta sobre tu workspace...</span>
  <kbd class="kbd kbd-sm shrink-0">{{ shortcutHint }}</kbd>
</div>
