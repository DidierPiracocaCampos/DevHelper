<div class="issue-detail">
  <form [formGroup]="_form" class="issue-detail-form" (ngSubmit)="save()">
    <div class="issue-detail-header">
      <div class="issue-detail-title-row">
        <ui-text-field
          labelText="Título"
          inputId="issue-detail-title"
          formControlName="title"
          class="issue-detail-title-field"
        >
          <ng-template errorMessage="required">
            <p class="validator-hint">Este campo es obligatorio</p>
          </ng-template>
          <ng-template errorMessage="maxlength">
            <p class="validator-hint">Máximo 200 caracteres</p>
          </ng-template>
        </ui-text-field>

        <ui-select-field
          labelText="Prioridad"
          inputId="issue-detail-priority"
          [options]="priorityOptions"
          formControlName="priority"
          class="issue-detail-priority-field"
        />

        <button
          type="button"
          data-testid="status-circle"
          class="status-circle"
          [ngClass]="statusCircleClass()"
          [attr.aria-label]="
            issue()?.status === 'done' ? 'Marcar como pendiente' : 'Marcar como hecho'
          "
          (click)="toggleStatus()"
        ></button>
      </div>

      <ui-textarea-field
        inputId="issue-detail-description"
        formControlName="description"
        placeholder="Contexto del issue (opcional)"
        [rows]="3"
        [maxlength]="20000"
      >
        <ng-template uiLabel>Descripción</ng-template>
      </ui-textarea-field>

      <ui-textarea-field
        inputId="issue-detail-solution"
        formControlName="solution"
        placeholder="¿Cómo se resolvió? (opcional)"
        [rows]="4"
        [maxlength]="20000"
      >
        <ng-template uiLabel>Solución</ng-template>
      </ui-textarea-field>
    </div>

    <div class="issue-detail-panels">
      <div class="issue-detail-panel">
        <file-list />
      </div>
      <div class="issue-detail-panel">
        <password-list />
      </div>
    </div>

    <div class="issue-detail-footer">
      <ui-tooltip text="Exportar" placement="top" severity="secondary">
        <ui-card-button icon="ios_share" severity="secondary" size="xl" (click)="export()" />
      </ui-tooltip>
      <ui-tooltip text="Eliminar" placement="top" severity="neutral">
        <ui-card-button icon="delete" severity="neutral" size="xl" (click)="remove()" />
      </ui-tooltip>
      <ui-tooltip text="Guardar" placement="top" severity="accent">
        <ui-card-button
          icon="check"
          severity="accent"
          size="xl"
          type="submit"
          (click)="save()"
        />
      </ui-tooltip>
    </div>
  </form>
</div>
