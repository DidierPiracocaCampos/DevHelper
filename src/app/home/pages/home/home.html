<div
  class="h-screen overflow-hidden grid grid-cols-12 grid-rows-[1fr_2.5fr_2fr_2fr] gap-2 px-2 pt-2 bg-base-100"
>
  <project-list class="col-span-7" />
  <ui-card class="col-span-5" title="Buscador"></ui-card>
  <ui-card class="col-span-7 row-span-2" theme="light" title="Tareas"></ui-card>
  <div
    class="col-span-1 w-fit justify-self-center self-center flex flex-col justify-center items-center gap-4"
  >
    <ui-card-button icon="data_object" size="lg" (click)="openVault()" />
    <ui-card-button icon="settings" size="lg" (click)="openConfig()" />
    <ui-card-button icon="logout" size="lg" (click)="logout()" />
  </div>
  <home-calendar class="col-span-4" />
  <nasa-picture class="col-span-5" />
  <file-list class="col-span-6 min-h-0" />
  <password-list class="col-span-6 min-h-0" />
</div>

<secure-create-vault />
<secure-unlock-vault />
<ui-config-modal [(isOpen)]="isConfigOpen">
  <nasa-image-section />
</ui-config-modal>
