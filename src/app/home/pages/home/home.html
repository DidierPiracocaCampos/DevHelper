<!-- Mobile layout (< 768px) -->
<div class="md:hidden flex flex-col h-[100dvh] overflow-x-hidden">
  <home-compact-header (config)="openConfig()" (logout)="logout()" />
  <main class="flex-1 overflow-y-auto overflow-x-hidden flex flex-col gap-4 p-2">
    <project-list />
    <issue-list class="min-h-80 lg:min-h-0" />
    <file-list class="min-h-64 lg:min-h-0" />
    <password-list class="min-h-64 lg:min-h-0" />
    <home-calendar />
    <div class="aspect-video">
      <nasa-picture class="h-full" />
    </div>
  </main>
</div>

<!-- Tablet layout (768-1023px) -->
<div class="hidden md:flex lg:hidden flex-col h-[100dvh]">
  <home-compact-header (config)="openConfig()" (logout)="logout()" />
  <main class="flex-1 overflow-y-auto grid grid-cols-2 gap-4 p-2 content-start">
    <project-list class="col-span-2" />
    <issue-list class="col-span-2 min-h-96 lg:min-h-0" />
    <file-list class="min-h-64 lg:min-h-0" />
    <password-list class="min-h-64 lg:min-h-0" />
    <home-calendar />
    <nasa-picture />
  </main>
</div>

<!-- Desktop layout (>= 1024px) -->
<div
  class="hidden lg:grid grid-cols-12 grid-rows-[1fr_2.5fr_2fr_2fr] gap-2 px-2 pt-2 bg-base-100 h-screen overflow-hidden"
>
  <project-list class="col-span-8" />
  <ai-assistant class="col-span-4" />
  <issue-list class="col-span-7 row-span-2" />
  <div
    class="col-span-1 w-fit justify-self-center self-center flex flex-col justify-center items-center gap-4"
  >
    <ui-card-button icon="data_object" size="lg" (press)="openVault()" />
    <ui-card-button icon="settings" size="lg" (press)="openConfig()" />
    <ui-card-button icon="logout" size="lg" (press)="logout()" />
  </div>
  <home-calendar class="col-span-4" />
  <nasa-picture class="col-span-5" />
  <file-list class="col-span-6 min-h-0" />
  <password-list class="col-span-6 min-h-0" />
</div>

<secure-unlock-vault />
<ui-config-modal [(isOpen)]="isConfigOpen" [initialSection]="_initialSection()" />

<app-welcome-ai-modal
  [isOpen]="isWelcomeAiOpen()"
  (accept)="acceptWelcomeAi()"
  (dismiss)="closeWelcomeAi()"
/>
