<div
  class="h-screen overflow-hidden grid grid-cols-12 grid-rows-[1fr_2fr_1fr_2fr] gap-4 px-4 pt-4 bg-base-100"
>
  <ui-card class="col-span-7" title="Proyectos">
    <div actions>
      <ui-card-button icon="filter_alt" />
      <ui-card-button icon="add" shape="circle" severity="primary" />
    </div>
  </ui-card>
  <ui-card class="col-span-5"></ui-card>
  <ui-card class="col-span-8 row-span-2" theme="light" title="Tareas"></ui-card>
  <div class="col-span-4 min-h-0 flex gap-4">
    <div class="flex flex-col justify-center items-center gap-4 h-full">
      <ui-card-button icon="data_object" size="xl" (click)="openVault()" />
      <ui-card-button icon="settings" size="xl" (click)="openConfig()" />
      <ui-card-button icon="logout" size="xl" (click)="logout()" />
    </div>
    <ui-card class="w-full" theme="light" title="Calendario"></ui-card>
  </div>
  <nasa-picture class="col-span-4" />
  <ui-card class="col-span-6 min-h-0" title="Archivos">
    <ui-file-list
      class="h-full"
      [files]="fileList()"
      [loading]="fileLoading()"
      [error]="fileError()"
      [namespace]="namespace()"
      (view)="onView($event)"
      (remove)="onRemove($event)"
    />
    <div actions>
      <ui-card-button icon="add" shape="circle" severity="primary" (click)="openAdd()" />
    </div>
  </ui-card>
  <password-list class="col-span-6 min-h-0" />
</div>

<secure-create-vault />
<secure-unlock-vault />
<ui-config-modal [(isOpen)]="isConfigOpen">
  <nasa-image-section />
</ui-config-modal>

<ui-add-file
  [namespace]="namespace()"
  [encrypt]="true"
  [(isOpen)]="isAddOpen"
  (added)="onAdded()"
/>
<ui-view-file [file]="viewFile()" [namespace]="namespace()" [(isOpen)]="isViewOpen" />
